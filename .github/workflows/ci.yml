name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-server
            path: platform/api-server
            dockerfile: true
          - name: build-runner
            path: platform/build-runner
            dockerfile: true
          - name: deploy-scheduler
            path: platform/deploy-scheduler
            dockerfile: true
          - name: web
            path: platform/web
            dockerfile: true
            build-step: true
          - name: cli
            path: platform/cli
            dockerfile: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service.path }}

      - name: Syntax check (entry point)
        run: node --check src/index.js
        working-directory: ${{ matrix.service.path }}

      - name: Build (web)
        if: matrix.service.build-step
        run: npm run build
        working-directory: ${{ matrix.service.path }}

      - name: Docker build (verify)
        if: matrix.service.dockerfile
        run: docker build -t ${{ matrix.service.name }}:ci-test .
        working-directory: ${{ matrix.service.path }}
