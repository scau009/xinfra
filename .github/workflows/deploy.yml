name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Deploy on CVM
    runs-on: ubuntu-latest

    steps:
      - name: Run deploy script on CVM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: /opt/plat/repo/platform/scripts/deploy.sh
