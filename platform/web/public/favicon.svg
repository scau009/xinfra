<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#050505" rx="0" />

  <!-- Grid overlay — 8x8 subtle grid, echoes the app's body::before -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="8"  y1="0"  x2="8"  y2="32" />
    <line x1="16" y1="0"  x2="16" y2="32" />
    <line x1="24" y1="0"  x2="24" y2="32" />
    <line x1="0"  y1="8"  x2="32" y2="8"  />
    <line x1="0"  y1="16" x2="32" y2="16" />
    <line x1="0"  y1="24" x2="32" y2="24" />
  </g>

  <!-- Prompt chevron ">" — thick geometric, blocky terminals -->
  <polyline
    points="8,10 20,16 8,22"
    fill="none"
    stroke="#ffffff"
    stroke-width="4"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />

  <!-- Cursor block — solid rectangle, echoes the blinking cursor in UI -->
  <rect x="24" y="9" width="3.5" height="14" fill="#ffffff" />
</svg>
